<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found Items</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 800px; margin-top: 50px; }
        .item-card { margin-bottom: 20px; }
        body{
            font-family: Arial, sans-serif;
    background: linear-gradient(85deg,#14001b,#20002c,#cbb4d4);
    min-height: 100vh;
    margin: 0;
    padding: 20px;
        }
        h1{
            text-align: center;
            font-family: sreda;
            color: rgb(255, 252, 252);
            
        }
        #logo{
            height: 150px;
            width: 150px;
            border-radius: 100px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border: 3px solid #3498db;
            margin-bottom: 20px;
        }

        #logo:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <center>
        <img src="logo.png" alt="logo" id="logo"></center>
        <h1 class="text-center mb-4">Lost & Found Items</h1>
        
       
        <div class="card mb-4">
            <div class="card-header">
                <h5>Report a Lost or Found Item</h5>
            </div>
            <div class="card-body">
                <form id="itemForm">
                    <div class="mb-3">
                        <label for="type" class="form-label">Type</label>
                        <select class="form-select" id="type" required>
                            <option value="">Select...</option>
                            <option value="lost">Lost</option>
                            <option value="found">Found</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" rows="3" placeholder="Describe the item (e.g., color, size, location found/lost)" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="file" class="form-label">Upload Image/File</label>
                        <input type="file" class="form-control" id="file" accept="image/*" required>
                        <small class="form-text text-muted">Only images are allowed for demo purposes.</small>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                    <input type="reset" class="btn btn-primary">
                </form>
            </div>
        </div>
        
        <h5 style="font-family: sreda;
            color: rgb(255, 252, 252);">Recent Submissions</h5>
        <div id="itemsList" class="row">
          
        </div>
    </div>

   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
     
        document.addEventListener('DOMContentLoaded', loadItems);


        document.getElementById('itemForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const type = document.getElementById('type').value;
            const description = document.getElementById('description').value;
            const fileInput = document.getElementById('file');
            const file = fileInput.files[0];
            
            if (!type || !description || !file) {
                alert('Please fill all fields.');
                return;
            }
            
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const item = {
                    id: Date.now(),
                    type: type,
                    description: description,
                    imageUrl: e.target.result 
                };
                
                
                saveItem(item);
                
               
                document.getElementById('itemForm').reset();
                
               
                loadItems();
            };
            reader.readAsDataURL(file);
        });

        function saveItem(item) {
            const items = JSON.parse(localStorage.getItem('lostFoundItems')) || [];
            items.push(item);
            localStorage.setItem('lostFoundItems', JSON.stringify(items));
        }

        function loadItems() {
            const items = JSON.parse(localStorage.getItem('lostFoundItems')) || [];
            const list = document.getElementById('itemsList');
            list.innerHTML = '';
            
            items.forEach(item => {
                const col = document.createElement('div');
                col.className = 'col-md-6';
                col.innerHTML = `
                    <div class="card item-card">
                        <img src="${item.imageUrl}" class="card-img-top" alt="Item Image">
                        <div class="card-body">
                            <h6 class="card-title">${item.type.charAt(0).toUpperCase() + item.type.slice(1)} Item</h6>
                            <p class="card-text">${item.description}</p>
                        </div>
                    </div>
                `;
                list.appendChild(col);
            });
        }
    </script>
</body>
</html>
