<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(85deg,#14001b,#20002c,#cbb4d4);
    min-height: 100vh;
    margin: 0;
    padding: 20px;
}
#logo{
            height: 150px;
            width: 150px;
            border-radius: 100px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border: 3px solid #3498db;
            margin-bottom: 20px;
        }

        #logo:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            filter: brightness(1.1);
        }
.container {
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
    text-align: center;
    color: #4CAF50;
}

.input-section {
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    margin-bottom: 20px;
    align-items: center;
}

input, select {
    height: 48px;
    padding: 10px 14px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ddd;
    flex: 1;
    min-width: 180px;
}

button {
    height: 48px;
    padding: 0 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

.add-btn {
    background: #4CAF50;
}

.clear-btn {
    background: #f44336;
    color: white;
    margin-bottom: 15px;
}

.filter-section {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.filter-btn {
    background: #eee;
    border: 1px solid #ccc;
}

.filter-btn.active {
    background: #4CAF50;
    color: white;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    background: #f9f9f9;
    margin-bottom: 10px;
    padding: 15px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

li.completed {
    text-decoration: line-through;
    background: #e8f5e8;
}

.priority {
    padding: 3px 8px;
    border-radius: 12px;
    font-size: 12px;
    color: white;
}

.low { background: #4CAF50; }
.medium { background: #ff9800; }
.high { background: #ff5722; }

.task-actions button {
    margin-left: 5px;
}


.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
}
#title{
     height: auto;
            justify-items: center;
            
            text-align: center;
            padding: 20px;
            font-family: sreda;
            color: rgb(255, 252, 252);
            
            
}
</style>
</head>

<body>
    <div id="title">
<img src="logo.png" alt="logo" id="logo">
<h1 style="color: #ccc;">Student Onespot</h1>
</div>
<div class="container">
<h1><i class="fas fa-tasks"></i> Task Manager</h1>

<div class="input-section">
    <input type="text" id="taskInput" placeholder="Enter task">
    <select id="prioritySelect">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select><br>
    <input type="date" id="dueDateInput">
    <button class="add-btn" onclick="addTask()">Add Task</button>
</div>

<button class="clear-btn" onclick="clearAllTasks()">Clear All Tasks</button>

<div class="filter-section">
    <button class="filter-btn active" onclick="filterTasks('all', this)">All</button>
    <button class="filter-btn" onclick="filterTasks('pending', this)">Pending</button>
    <button class="filter-btn" onclick="filterTasks('completed', this)">Completed</button>
</div>

<ul id="taskList"></ul>
</div>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h2>Task Added</h2>
        <p>Your task was added successfully.</p>
        <button onclick="closeModal()">OK</button>
    </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let currentFilter = "all";

function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
        if (
            currentFilter === "all" ||
            (currentFilter === "pending" && !task.completed) ||
            (currentFilter === "completed" && task.completed)
        ) {
            const li = document.createElement("li");
            if (task.completed) li.classList.add("completed");

            li.innerHTML = `
                <div>
                    <strong>${task.text}</strong><br>
                    <span class="priority ${task.priority}">${task.priority.toUpperCase()}</span>
                    ${task.dueDate ? " | Due: " + task.dueDate : ""}
                </div>
                <div class="task-actions">
                    <button onclick="toggleComplete(${index})">✔</button>
                    <button onclick="deleteTask(${index})">🗑</button>
                </div>
            `;
            list.appendChild(li);
        }
    });
}

function addTask() {
    const text = taskInput.value.trim();
    if (!text) return;

    tasks.push({
        text,
        priority: prioritySelect.value,
        dueDate: dueDateInput.value,
        completed: false
    });

    saveTasks();
    renderTasks();

    taskInput.value = "";
    dueDateInput.value = "";

    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function toggleComplete(index) {
    tasks[index].completed = !tasks[index].completed;
    saveTasks();
    renderTasks();
}

function deleteTask(index) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks();
}

function clearAllTasks() {
    if (confirm("Delete all tasks?")) {
        tasks = [];
        localStorage.removeItem("tasks");
        renderTasks();
    }
}

function filterTasks(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderTasks();
}

renderTasks();
</script>

</body>
</html>
